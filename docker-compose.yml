services:
  postgres:
    image: postgres:15-alpine
    container_name: gestao-oficina-db
    environment:
      POSTGRES_DB: gestao_oficina
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-migrate.sh:/docker-entrypoint-initdb.d/01-migrate.sh:ro
      - ./server/src/main/resources/database:/sql:ro
    networks:
      - gestao-oficina
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestao_oficina"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: gestao-oficina-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gestao_oficina
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: gestao-oficina-docker-secret-key-min-32-chars!!
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    networks:
      - gestao-oficina
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ""
    container_name: gestao-oficina-web
    ports:
      - "3000:80"
    networks:
      - gestao-oficina
    depends_on:
      server:
        condition: service_healthy

networks:
  gestao-oficina:
    driver: bridge

volumes:
  postgres_data:
